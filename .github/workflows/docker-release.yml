name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      # Only rebuild when something that affects the image changes
      - "**.py"
      - "requirements.txt"
      - "Dockerfile"
      - "docker/**"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional: notify Portainer to redeploy the stack automatically.
      # To enable: add PORTAINER_WEBHOOK_URL as a repository secret in
      # GitHub → Settings → Secrets → Actions.
      - name: Trigger Portainer redeploy
        if: ${{ secrets.PORTAINER_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
          echo "Portainer webhook triggered"
