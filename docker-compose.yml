services:
  ibkr-mf-sync:
    image: ghcr.io/retrohazard/ibkr_mf_sync:latest
    container_name: ibkr-mf-sync
    restart: unless-stopped

    labels:
      # Opt this container into Watchtower auto-updates
      - "com.centurylinklabs.watchtower.enable=true"

    environment:
      # --- MoneyForward credentials ---
      - MF_EMAIL=${MF_EMAIL}
      - MF_PASSWORD=${MF_PASSWORD}
      - MF_IB_INSTITUTION_URL=${MF_IB_INSTITUTION_URL}

      # --- IBKR Flex Query ---
      - IBKR_FLEX_TOKEN=${IBKR_FLEX_TOKEN}
      - IBKR_FLEX_QUERY_ID=${IBKR_FLEX_QUERY_ID}

      # --- Schedule (cron syntax, default: 6am daily) ---
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 6 * * *}

      # --- Run once immediately when the container starts ---
      - RUN_ON_START=${RUN_ON_START:-false}

      # --- Session file path inside the container (matches volume mount below) ---
      - BROWSER_SESSION_PATH=/app/session/.browser_session.json

      # --- Prevents headed browser fallback when 2FA is triggered ---
      - HEADLESS_ONLY=true

    volumes:
      # Persists the MoneyForward login session across container restarts.
      # IMPORTANT: Seed this with a valid session before first run — see README.
      - ibkr-session:/app/session

      # Persists IBKR Flex Query response cache (avoids redundant API calls).
      - ibkr-cache:/app/.cache

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower-ibkr
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Only watch containers that have the watchtower enable label
      - WATCHTOWER_LABEL_ENABLE=true
      # Remove old images after a successful update
      - WATCHTOWER_CLEANUP=true
      # How often to check for new images, in seconds (default: every 6 hours)
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_POLL_INTERVAL:-21600}

volumes:
  ibkr-session:
  ibkr-cache:
